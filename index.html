    <script id="jwt-functionality">
        document.addEventListener('DOMContentLoaded', function () {
            let isUpdating = false;
            let currentHeader = null;
            let currentPayload = null;
            function base64UrlEncode(str) {
                return btoa(str).replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
            }
            function base64UrlDecode(str) {
                str = str.replace(/-/g, '+').replace(/_/g, '/');
                while (str.length % 4) {
                    str += '=';
                }
                return atob(str);
            }
            function showError(message) {
                const errorDiv = document.getElementById('errorMessage');
                const errorText = document.getElementById('errorText');
                errorText.textContent = message;
                errorDiv.classList.remove('hidden');
                setTimeout(() => {
                    errorDiv.classList.add('hidden');
                }, 3000);
            }
            function hideError() {
                document.getElementById('errorMessage').classList.add('hidden');
            }
            async function hmacSign(key, data, algorithm) {
                const encoder = new TextEncoder();
                const keyData = encoder.encode(key);
                const messageData = encoder.encode(data);
                let hashAlgorithm;
                switch (algorithm) {
                    case 'HS256':
                        hashAlgorithm = 'SHA-256';
                        break;
                    case 'HS384':
                        hashAlgorithm = 'SHA-384';
                        break;
                    case 'HS512':
                        hashAlgorithm = 'SHA-512';
                        break;
                    default:
                        throw new Error(`不支持的算法: ${algorithm}`);
                }
                const cryptoKey = await crypto.subtle.importKey(
                    'raw',
                    keyData,
                    { name: 'HMAC', hash: hashAlgorithm },
                    false,
                    ['sign']
                );
                const signature = await crypto.subtle.sign('HMAC', cryptoKey, messageData);
                return new Uint8Array(signature);
            }
            async function rsaSign(privateKey, data, algorithm) {
                const encoder = new TextEncoder();
                const messageData = encoder.encode(data);
                let hashAlgorithm;
                switch (algorithm) {
                    case 'RS256':
                        hashAlgorithm = 'SHA-256';
                        break;
                    case 'RS384':
                        hashAlgorithm = 'SHA-384';
                        break;
                    case 'RS512':
                        hashAlgorithm = 'SHA-512';
                        break;
                    default:
                        throw new Error(`不支持的算法: ${algorithm}`);
                }
                try {
                    const cryptoKey = await crypto.subtle.importKey(
                        'pkcs8',
                        pemToArrayBuffer(privateKey),
                        {
                            name: 'RSASSA-PKCS1-v1_5',
                            hash: hashAlgorithm
                        },
                        false,
                        ['sign']
                    );
                    const signature = await crypto.subtle.sign(
                        'RSASSA-PKCS1-v1_5',
                        cryptoKey,
                        messageData
                    );
                    return new Uint8Array(signature);
                } catch (error) {
                    throw new Error('RSA 私钥格式错误或算法不支持');
                }
            }
            function pemToArrayBuffer(pem) {
                const pemHeader = '-----BEGIN PRIVATE KEY-----';
                const pemFooter = '-----END PRIVATE KEY-----';
                const pemContents = pem.replace(pemHeader, '').replace(pemFooter, '').replace(/\s/g, '');
                const binaryString = atob(pemContents);
                const bytes = new Uint8Array(binaryString.length);
                for (let i = 0; i < binaryString.length; i++) {
                    bytes[i] = binaryString.charCodeAt(i);
                }
                return bytes.buffer;
            }
            function arrayBufferToBase64Url(buffer) {
                const bytes = new Uint8Array(buffer);
                let binary = '';
                for (let i = 0; i < bytes.byteLength; i++) {
                    binary += String.fromCharCode(bytes[i]);
                }
                return base64UrlEncode(binary);
            }
            function updateKeyStatus(isValid, message) {
                const keyStatus = document.getElementById('keyStatus');
                const keyStatusIcon = document.getElementById('keyStatusIcon');
                const keyStatusText = document.getElementById('keyStatusText');
                keyStatus.classList.remove('hidden');
                keyStatusText.textContent = message;
                if (isValid) {
                    keyStatusIcon.className = 'ri-check-line text-green-500';
                    keyStatusText.className = 'text-green-600';
                } else {
                    keyStatusIcon.className = 'ri-close-line text-red-500';
                    keyStatusText.className = 'text-red-600';
                }
            }
            function updateSignatureStatus(isValid, message) {
                const signatureStatus = document.getElementById('signatureStatus');
                const statusClass = isValid ? 'bg-green-50 border-green-200' : 'bg-red-50 border-red-200';
                const iconClass = isValid ? 'ri-shield-check-line text-green-500' : 'ri-shield-cross-line text-red-500';
                const textClass = isValid ? 'text-green-700' : 'text-red-700';
                signatureStatus.className = `p-3 rounded-lg border text-sm ${statusClass}`;
                signatureStatus.innerHTML = `
<div class="flex items-center ${textClass}">
<div class="w-4 h-4 flex items-center justify-center mr-2">
<i class="${iconClass}"></i>
</div>
<span>${message}</span>
</div>
`;
            }
            async function generateJWT(header, payload, secretKey) {
                try {
                    const encodedHeader = base64UrlEncode(JSON.stringify(header));
                    const encodedPayload = base64UrlEncode(JSON.stringify(payload));
                    const signingInput = encodedHeader + '.' + encodedPayload;
                    const algorithm = header.alg;
                    let signature;
                    if (['HS256', 'HS384', 'HS512'].includes(algorithm)) {
                        signature = await hmacSign(secretKey, signingInput, algorithm);
                    } else if (['RS256', 'RS384', 'RS512'].includes(algorithm)) {
                        signature = await rsaSign(secretKey, signingInput, algorithm);
                    } else {
                        throw new Error(`不支持的算法: ${algorithm}`);
                    }
                    const encodedSignature = arrayBufferToBase64Url(signature);
                    return signingInput + '.' + encodedSignature;
                } catch (error) {
                    throw error;
                }
            }
            async function decodeJWT(token, secretKey) {
                try {
                    const parts = token.split('.');
                    if (parts.length !== 3) {
                        throw new Error('JWT Token 格式错误');
                    }
                    const header = JSON.parse(base64UrlDecode(parts[0]));
                    const payload = JSON.parse(base64UrlDecode(parts[1]));
                    const signature = parts[2];
                    let isSignatureValid = false;
                    let signatureMessage = '无密钥，无法验证签名';
                    if (secretKey) {
                        try {
                            const expectedJWT = await generateJWT(header, payload, secretKey);
                            const expectedSignature = expectedJWT.split('.')[2];
                            isSignatureValid = signature === expectedSignature;
                            signatureMessage = isSignatureValid ? '签名验证通过' : '签名验证失败，密钥可能不正确';
                            updateKeyStatus(isSignatureValid, isSignatureValid ? '密钥正确' : '密钥错误');
                        } catch (error) {
                            signatureMessage = '签名验证出错：' + error.message;
                            updateKeyStatus(false, '密钥验证失败');
                        }
                    } else {
                        document.getElementById('keyStatus').classList.add('hidden');
                    }
                    updateSignatureStatus(isSignatureValid, signatureMessage);
                    return { header, payload };
                } catch (error) {
                    throw error;
                }
            }
            async function updateJWT() {
                if (isUpdating) return;
                const jwtInput = document.getElementById('jwtInput');
                const secretKey = document.getElementById('secretKey').value.trim();
                const headerEditor = document.getElementById('headerEditor');
                const payloadEditor = document.getElementById('payloadEditor');
                try {
                    if (currentHeader && currentPayload && secretKey) {
                        isUpdating = true;
                        const newJWT = await generateJWT(currentHeader, currentPayload, secretKey);
                        jwtInput.value = newJWT;
                        isUpdating = false;
                    }
                } catch (error) {
                    isUpdating = false;
                    showError('生成 JWT 时发生错误：' + error.message);
                }
            }
            document.getElementById('jwtInput').addEventListener('input', async function () {
                if (isUpdating) return;
                hideError();
                const token = this.value.trim();
                const secretKey = document.getElementById('secretKey').value.trim();
                const headerEditor = document.getElementById('headerEditor');
                const payloadEditor = document.getElementById('payloadEditor');
                if (!token) {
                    headerEditor.value = '';
                    payloadEditor.value = '';
                    payloadEditor.placeholder = '请输入 JWT Token 进行解析';
                    updateSignatureStatus(false, '请输入 JWT Token');
                    document.getElementById('keyStatus').classList.add('hidden');
                    currentHeader = null;
                    currentPayload = null;
                    return;
                }
                try {
                    const { header, payload } = await decodeJWT(token, secretKey);
                    currentHeader = header;
                    currentPayload = payload;
                    headerEditor.value = JSON.stringify(header, null, 2);
                    payloadEditor.value = JSON.stringify(payload, null, 2);
                    payloadEditor.placeholder = '';
                } catch (error) {
                    showError('解析 JWT 时发生错误：' + error.message);
                    headerEditor.value = '';
                    payloadEditor.value = '';
                    payloadEditor.placeholder = '请输入有效的 JWT Token';
                    updateSignatureStatus(false, 'JWT 格式错误');
                    currentHeader = null;
                    currentPayload = null;
                }
            });
            document.getElementById('secretKey').addEventListener('input', async function () {
                const token = document.getElementById('jwtInput').value.trim();
                const secretKey = this.value.trim();
                if (token) {
                    try {
                        await decodeJWT(token, secretKey);
                    } catch (error) {
                        showError('验证签名时发生错误：' + error.message);
                    }
                }
            });
            document.getElementById('payloadEditor').addEventListener('input', async function () {
                if (isUpdating) return;
                hideError();
                const payloadText = this.value.trim();
                const secretKey = document.getElementById('secretKey').value.trim();
                if (!payloadText || !currentHeader) return;
                try {
                    const newPayload = JSON.parse(payloadText);
                    currentPayload = newPayload;
                    await updateJWT();
                } catch (error) {
                    showError('Payload JSON 格式错误：' + error.message);
                }
            });
        });
    </script>
